{{- $width := .Options.width | default "100%" -}}
{{- $height := .Options.height | default "30rem" -}}
{{- $id := printf "echarts-%d" now.UnixNano -}}
{{- $cdn := "https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js" -}}

<script>
    function renderEcharts{{ $id }}() {
        var dom = document.getElementById('{{ $id }}');
        if (!dom) return;
        var myChart = echarts.init(dom);
        var option = {{ .Inner | safeJS }};
        myChart.setOption(option);
    }

    function loadEChartsAndRender{{ $id }}() {
        if (typeof echarts !== 'undefined') {
            renderEcharts{{ $id }}();
        } else {
            var script = document.createElement('script');
            script.src = '{{ $cdn }}';
            script.onload = function() {
                renderEcharts{{ $id }}();
            };
            document.head.appendChild(script);
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadEChartsAndRender{{ $id }});
    } else {
        loadEChartsAndRender{{ $id }}();
    }
</script>
<div id="{{ $id }}" style="width: {{ $width }}; height: {{ $height }};"></div>
