{{- $width := .Get "width" | default "100%" -}}
{{- $height := .Get "height" | default "30rem" -}}
{{- $id := printf "echarts-%d" now.UnixNano -}}
{{- $funcSuffix := now.UnixNano -}}
{{- $cdn := "https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js" -}}

<script>
    function renderEcharts_{{ $funcSuffix }}() {
        var dom = document.getElementById('{{ $id }}');
        if (!dom) return;
        var myChart = echarts.init(dom);
        var option = {{ .Inner | safeJS }};
        myChart.setOption(option);
    }

    function loadEChartsAndRender_{{ $funcSuffix }}() {
        if (typeof echarts !== 'undefined') {
            renderEcharts_{{ $funcSuffix }}();
        } else {
            var script = document.createElement('script');
            script.src = '{{ $cdn }}';
            script.onload = function() {
                renderEcharts_{{ $funcSuffix }}();
            };
            document.head.appendChild(script);
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadEChartsAndRender_{{ $funcSuffix }});
    } else {
        loadEChartsAndRender_{{ $funcSuffix }}();
    }
</script>
<div id="{{ $id }}" style="width: {{ $width }}; height: {{ $height }};"></div>
